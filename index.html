
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew & Co | Coffee Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="coffee-shop-landing-page">
            <h1>Coffee Shop</h1>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#menu">Menu</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="hero-section" id="home">
        <h1>Brew & Co</h1>
        <h2>Welcome to Coffee Shop</h2>
        <p>Fresh Coffee, Every Morning</p>
        <button>BUY NOW</button>
    </div>

    <div class="featured-p" id="menu">
        <div class="featured">
            <div class="card">
                <h2>Espresso</h2>
                <p>Rich and bold single shot coffee</p>
                <p><strong>$3</strong></p>
                <button>Buy Now</button>
            </div>
        </div>

        <div class="featured">
            <div class="card">
                <h2>Cappuccino</h2>
                <p>Creamy espresso with steamed milk foam</p>
                <p><strong>$4</strong></p>
                <button>Buy Now</button>
            </div>
        </div>

        <div class="featured">
            <div class="card">
                <h2>Latte</h2>
                <p>Smooth espresso with silky steamed milk</p>
                <p><strong>$5</strong></p>
                <button>Buy Now</button>
            </div>
        </div>
    </div>

    <footer>
        <h2>@Coffee Shop 2026</h2>
    </footer>

</body>
</html>
